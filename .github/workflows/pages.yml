name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'privacy.html'
      - '.nojekyll'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/privacy.html _site/
          cp .nojekyll _site/
          # Copy icons so they resolve if referenced
          mkdir -p _site/icons && cp icons/*.png _site/icons/ 2>/dev/null || true
          # Copy landing page (docs/) to site root
          cp -r docs/* _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

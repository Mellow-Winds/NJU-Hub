<section id="section-eval" class="settings-section">
            <h2>自动评教设置</h2>
            <p class="section-desc">状态机全自动评教：锁定"很好"，随机评语，自动处理弹窗，期末/助教自动流转。</p>
            <div class="card">
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">启用自动评教模块</span></div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-eval">
                        <span class="slider round"></span>
                    </label>
                </div>
                <p class="hint-text" style="margin-top:12px; color:var(--md-sys-color-on-surface-variant); font-size:13px;">
                    进入评教页面后，点击右下角浮动按钮即可启动全自动评教。评语由内置语料库随机生成，无需额外配置。
                </p>
            </div>
        </section>

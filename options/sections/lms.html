<section id="section-lms" class="settings-section">
            <h2>智汇南雍增强设置</h2>
            <p class="section-desc">视频限制解除与课件批量下载增强。</p>
            <div class="card">
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">启用 LMS 增强模块</span></div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-lms">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="divider">视频</div>
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">解除视频限制</span></div>
                    <label class="switch">
                        <input type="checkbox" id="lms-video-remove-restrict">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">自动连播</span></div>
                    <label class="switch">
                        <input type="checkbox" id="lms-video-autojump">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="divider">下载</div>
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">下载列表默认全选</span></div>
                    <label class="switch">
                        <input type="checkbox" id="lms-dl-default-all">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-group">
                    <div class="toggle-info"><span class="label">显示文件选择框</span></div>
                    <label class="switch">
                        <input type="checkbox" id="lms-dl-show-checkbox">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </section>

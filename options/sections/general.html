<section id="section-general" class="settings-section active">
            <h2>个人信息</h2>
            <p class="section-desc">管理你的基础身份信息，用于自动登录。所有信息本地保存，不上传云端。</p>
            <div class="card">
                <div class="form-group">
                    <label for="common-name">昵称</label>
                    <input type="text" id="common-name" placeholder="应该如何称呼您？">
                </div>
                <div class="form-group">
                    <label for="common-id">学号</label>
                    <input type="text" id="common-id" placeholder="此处填写用于自动登录的学号">
                </div>
                <div class="form-group">
                    <label for="common-pwd">统一认证密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="common-pwd" placeholder="仅用于自动登录加密存储">
                        <span class="toggle-password" role="button" tabindex="0" aria-label="显示密码">
                            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                <path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>
        </section>
